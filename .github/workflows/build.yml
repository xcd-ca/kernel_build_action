name: Build Xiaomi 11 Star Kernel (Fix Linker & Vibration)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: 1. 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev clang lld llvm tar cpio perl python3 git zip wget

      - name: 2. 拉取源码 (Star 5.4)
        run: |
          git clone --depth=1 -b miui-t https://github.com/tanz3/kernel_xiaomi_sm8350-miui kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b android12-release gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b android12-release gcc32

      - name: 3. 集成 SukiSU
        run: |
          cd kernel
          curl -LSs -f "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash

      - name: 4. 深度修复：震动校准匹配 & KSU 兼容性
        run: |
          cd kernel
          # --- 1. KSU 相关修复 ---
          find -L drivers/kernelsu -type f -name "*.c" -exec sed -i 's/TWA_RESUME/true/g' {} + || true
          find -L drivers/kernelsu -type f -name "*.c" -exec sed -i 's/TWA_SIGNAL/true/g' {} + || true
          find -L drivers/kernelsu -type f -name "app_profile.c" -exec sed -i 's/atomic_set(&.*seccomp.filter_count, 0);/\/\/ &/g' {} + || true
          find -L drivers/kernelsu -type f -name "sucompat.c" -exec sed -i 's/<linux\/pgtable\.h>/<asm\/pgtable\.h>/g' {} + || true
          
          # --- 2. 【核心】修复震动问题的版本锁定 ---
          # 强制 SUBLEVEL 为 233
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 233/' Makefile
          # 彻底禁用 scripts/setlocalversion 自动添加 + 号后缀
          echo "exit 0" > scripts/setlocalversion
          chmod +x scripts/setlocalversion
          
          # --- 3. 配置合并与马达驱动锁定 ---
          cat arch/arm64/configs/vendor/lahaina-qgki_defconfig \
              arch/arm64/configs/vendor/xiaomi_QGKI.config \
              arch/arm64/configs/vendor/star_QGKI.config > arch/arm64/configs/star_merged_defconfig
          
          {
            echo "CONFIG_SUKI=y"
            # 这里的版本号必须与你原厂内核完全一致
            echo "CONFIG_LOCALVERSION=\"-qgki-gbb70cde46897\""
            echo "CONFIG_LOCALVERSION_AUTO=n"
            # 确保马达校准逻辑相关的驱动开启
            echo "CONFIG_INPUT_XIAOMI_VIBRATOR=y"
            echo "CONFIG_INPUT_AW8697_HAPTIC=y"
            # 解决 Linker 可能的报错
            echo "CONFIG_STACKPROTECTOR=n"
            echo "CONFIG_STACKPROTECTOR_STRONG=n"
          } >> arch/arm64/configs/star_merged_defconfig

      - name: 5. 纯净编译 (注入版本参数)
        run: |
          cd kernel
          
          # 建议 2: 核心修复 - 移除工具链中过旧的 Linker 软链接
          # 这样可以防止它干扰 Host Tools 的编译，同时不影响内核使用的 ld.lld
          rm -f $GITHUB_WORKSPACE/clang/bin/ld $GITHUB_WORKSPACE/clang/bin/ld.gold $GITHUB_WORKSPACE/clang/bin/ld.bfd
          
          # 设置环境变量
          export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
          
          # 检查版本信息是否准确（这决定了震动是否正常）
          # 请确保 SUBLEVEL 和 CONFIG_LOCALVERSION 组合后与你手机 cat /proc/version 的结果完全一致
          # 示例：5.4.233-qgki-gbb70cde46897
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 233/' Makefile
          echo "exit 0" > scripts/setlocalversion
          export CONFIG_LOCALVERSION="-qgki-gbb70cde46897"
          
          # 生成配置
          make O=out ARCH=arm64 star_merged_defconfig
          
          # 开始编译
          make -j$(nproc --all) O=out ARCH=arm64 \
               CC=clang HOSTCC=gcc HOSTCXX=g++ \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               KCFLAGS="-Wno-implicit-function-declaration -fno-stack-protector" \
               LOCALVERSION=$CONFIG_LOCALVERSION \
               KBUILD_BUILD_USER="tanz3" \
               KBUILD_BUILD_HOST="github-action"

      - name: 6. 提取镜像
        run: |
          mkdir -p output
          [ -f kernel/out/arch/arm64/boot/Image ] && cp kernel/out/arch/arm64/boot/Image output/
          DTBO_PATH=$(find kernel/out -name "*star*.dtbo" | head -n 1)
          if [ -z "$DTBO_PATH" ]; then
            DTBO_PATH=$(find kernel/out -name "*lahaina*.dtbo" | head -n 1)
          fi
          [ ! -z "$DTBO_PATH" ] && cp "$DTBO_PATH" output/dtbo.img
          ls -lh output/

      - name: 7. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Mi11-Star-VibeFix-Images
          path: output/*
